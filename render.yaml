services:
  - type: web
    name: disasterverse-backend
    env: docker
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /api/v1/alerts
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8080